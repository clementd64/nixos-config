router id 194.28.98.82;

protocol static {
    ipv6;
    route 2a0c:b641:2b0::/48 blackhole;
    route 2a0c:b641:2b2::/48 blackhole;
}

protocol kernel {
    ipv6 {
        export filter {
            if source = RTS_DEVICE then reject;
            krt_prefsrc = 2a0c:b641:2b2::1;
            if(net ~ [ ::/0 ]) then reject;
            accept;
        };
    };
}

protocol bgp T_SERVPERSO from UPSTREAM {
    neighbor 2a0c:b640:8::ffff as 34872;
}

protocol bgp T_SERVPERSO_V4 from SERVPERSO_V4 {
    neighbor 194.28.98.94 as 34872;
}
