router id 194.28.98.82;

define IPV4_RANGE = [ 194.28.98.112/31+ ];

protocol static {
    ipv6;
    route 2a0c:b641:2b0::/48 blackhole;
    route 2a0c:b641:2b2::/48 blackhole;
}

protocol static {
    ipv4;
    route 0.0.0.0/0 blackhole;
}

protocol kernel {
    ipv6 {
        export filter {
            krt_prefsrc = 2a0c:b641:2b2::1;
            if(net ~ [ ::/0 ]) then reject;
            accept;
        };
    };
}

protocol kernel {
    ipv4 {
        export filter {
            if(net ~ IPV4_RANGE) then accept;
            reject;
        };
    };
}

protocol bgp T_SERVPERSO from UPSTREAM {
    neighbor 2a0c:b640:8::ffff as 34872;
}

protocol bgp D_HOME from DOWNSTREAM {
    neighbor fe80::2 as 65000;
    interface "wg-home";
    ipv6 {
        import filter {
            if(net ~ [ 2a0c:b641:2b0::/44{56,64} ]) then accept;
            reject;
        };
    };
    ipv4 {
        extended next hop yes;
        export filter {
            if(net = 0.0.0.0/0) then accept;
            reject;
        };
        import filter {
            if(net ~ IPV4_RANGE) then accept;
            reject;
        };
    };
}
