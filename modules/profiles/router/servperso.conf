define SERVPERSO_IPV4_RANGE = [ 62.3.50.46/31+ ];

protocol direct {
    ipv4;
    interface "*";
}

protocol static {
    ipv4;
    route 0.0.0.0/0 blackhole;
}

protocol kernel {
    learn;
    ipv4 {
        export filter {
            if source = RTS_DEVICE then reject;
            if(net ~ SERVPERSO_IPV4_RANGE) then accept;
            reject;
        };
        import filter {
            if(net ~ SERVPERSO_IPV4_RANGE) then accept;
            reject;
        };
    };
}

template bgp SERVPERSO_V4 {
    local as 212625;
    ipv4 {
        import none;
        export filter {
            if(net ~ SERVPERSO_IPV4_RANGE) then accept;
            reject;
        };
    };
}

protocol bgp D_HOME from DOWNSTREAM {
    neighbor fe80::2 as 65000;
    interface "wg-home";
    ipv6 {
        import filter {
            if(net ~ [ 2a0c:b641:2b0::/44{56,64} ]) then accept;
            reject;
        };
    };
    ipv4 {
        extended next hop yes;
        export filter {
            if(net = 0.0.0.0/0) then accept;
            reject;
        };
        import filter {
            if(net ~ SERVPERSO_IPV4_RANGE) then accept;
            reject;
        };
    };
}

protocol bgp D_ERYTHIA from DOWNSTREAM {
    neighbor ERYTHIA_IP as 65000;
    interface "wg-erythia";
    ipv6 {
        import filter {
            if(net ~ [ 2a0c:b641:2b0::/44{56,64} ]) then accept;
            reject;
        };
    };
}
